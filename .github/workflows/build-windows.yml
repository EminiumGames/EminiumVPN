name: Build Windows Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.4.1
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Install Neutralino CLI
      run: pnpm add -g @neutralinojs/neu
      
    - name: Build React app
      run: pnpm run build
      
    - name: Build Windows application
      run: npx neu build --release
      
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eminiumvpn-windows
        path: build/
        retention-days: 30
        
    - name: Create Release Asset
      if: github.event_name == 'release'
      run: |
        Compress-Archive -Path "build/*" -DestinationPath "EminiumVPN-win-x64.zip"
        
    - name: Upload Release Asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./EminiumVPN-win-x64.zip
        asset_name: EminiumVPN-win-x64.zip
        asset_content_type: application/zip
